<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Letters Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            color: var(--text-main);
        }
        .top-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .nav-brand {
            font-family: var(--font-tamil);
            font-size: 1.8rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
        }
        .user-badge {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-pill);
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body class="app-container">

    <header class="top-nav">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி</a>
        <div style="display: flex; gap: 15px; align-items:center;">
            <div class="user-badge" id="adaptive-badge" style="background: var(--info); color: white;">
                <i class="fa-solid fa-wand-magic-sparkles"></i> <span id="mode-text">Adaptive Mode</span>
            </div>
            <button class="btn btn-secondary btn-small" onclick="window.location.href='dashboard.html'">Dashboard</button>
        </div>
    </header>

    <main class="main-content page-enter" style="animation-delay: 0.1s;">
        <div class="text-center mb-2">
            <h1>Choose a Letter to Learn!</h1>
            <p>Pick any letter block below to start practicing.</p>
        </div>

        <div class="grid-3" id="letter-gallery">
            <!-- Adaptive Content rendered here via adaptive-engine.js -->
        </div>

    </main>

    <script src="main.js"></script>
    <script src="audio.js"></script>
    <script src="adaptive-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Update Adaptive Badge
            const style = app.state.dominant_style;
            document.getElementById('mode-text').innerText = `${style.charAt(0).toUpperCase() + style.slice(1)} Mode`;
            
            // Render Personalized Layout
            window.adaptiveEngineSys.renderContent();
        });
    </script>
</body>
</html>
