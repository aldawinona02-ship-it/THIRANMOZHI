<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Assessment Results</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="app-container">

    <header class="top-nav">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி</a>
    </header>

    <main class="main-content page-enter text-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <div class="glass-panel" style="max-width: 600px; width: 100%;">
            <div class="card-icon pop-in" style="margin: 0 auto 1.5rem; background: var(--primary-blue); color: white; width: 120px; height: 120px; font-size: 4rem;">
                <i class="fa-solid fa-medal"></i>
            </div>
            
            <h1 class="mb-1">Great Job! 🎉</h1>
            <p style="font-size: 1.5rem; color: var(--text-dark);">Your learning style is:</p>
            
            <h2 id="dominant-result" class="pop-in" style="font-size: 3.5rem; margin: 1rem 0; text-transform: capitalize; color: var(--primary-purple); animation-delay: 0.5s;">
                Loading...
            </h2>
            
            <p id="personalized-msg" style="color: var(--text-muted); margin-bottom: 2rem;">
                <!-- Filled via JS -->
            </p>

            <button class="btn btn-green btn-large pop-in" onclick="startLearning()" style="font-size: 1.5rem; padding: 1rem 3rem; animation-delay: 1s;">
                Start Learning Tamil <i class="fa-solid fa-book-open"></i>
            </button>
        </div>

    </main>

    <!-- Global Logic -->
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const style = app.state.dominant_style || 'visual';
            
            const resultEl = document.getElementById('dominant-result');
            resultEl.innerText = style;
            
            // Apply a color based on the result
            if(style === 'visual') resultEl.style.color = 'var(--primary-blue)';
            if(style === 'auditory') resultEl.style.color = 'var(--primary-yellow)';
            if(style === 'kinesthetic') resultEl.style.color = 'var(--primary-green)';

            const msgEl = document.getElementById('personalized-msg');
            if(style === 'visual') {
                msgEl.innerText = "We will prioritize pictures, high contrast colors, and visual stroke orders for your learning journey!";
            } else if (style === 'auditory') {
                msgEl.innerText = "We will prioritize spoken instructions and audio sounds for your learning journey!";
            } else {
                msgEl.innerText = "We will prioritize drag-and-drop mechanics and physical interactive tracing for your learning journey!";
            }
        });

        function startLearning() {
            app.navigate('learning.html');
        }
    </script>
</body>
</html>
