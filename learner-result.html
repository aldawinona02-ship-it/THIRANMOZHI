<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Assessment Results</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 3.5rem;
            max-width: 650px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .medal-icon {
            width: 120px;
            height: 120px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 1.5rem;
            box-shadow: var(--shadow-md);
        }
        .result-title {
            font-family: var(--font-tamil);
            font-size: 4rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="app-container">

    <main class="main-content text-center">
        <div class="glass-panel">
            <div class="medal-icon">
                <i class="fa-solid fa-medal"></i>
            </div>
            
            <h1 class="result-title">அற்புதம்! 🎉</h1>
            <p style="font-size: 1.4rem; color: var(--text-muted); font-weight: 600;">Your learning style is:</p>
            
            <h2 id="dominant-result" style="font-size: 3.5rem; margin: 1rem 0; text-transform: capitalize; color: var(--info); font-family: var(--font-tamil);">
                Loading...
            </h2>
            
            <p id="personalized-msg" style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1.1rem; font-weight: 600;">
                <!-- Filled via JS -->
            </p>

            <button class="btn btn-primary btn-large" onclick="startLearning()" style="width: 100%; font-size: 1.4rem;">
                Start Learning Tamil <i class="fa-solid fa-book-open"></i>
            </button>
        </div>
    </main>

    <!-- Global Logic -->
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const style = app.state.dominant_style || 'visual';
            
            const resultEl = document.getElementById('dominant-result');
            resultEl.innerText = style;
            
            // Apply a color based on the result
            if(style === 'visual') resultEl.style.color = 'var(--primary)';
            if(style === 'auditory') resultEl.style.color = 'var(--info)';
            if(style === 'kinesthetic') resultEl.style.color = 'var(--accent)';

            const msgEl = document.getElementById('personalized-msg');
            if(style === 'visual') {
                msgEl.innerText = "We will prioritize pictures, high contrast colors, and visual stroke orders for your learning journey!";
            } else if (style === 'auditory') {
                msgEl.innerText = "We will prioritize spoken instructions and audio sounds for your learning journey!";
            } else {
                msgEl.innerText = "We will prioritize drag-and-drop mechanics and physical interactive tracing for your learning journey!";
            }
        });

        function startLearning() {
            window.location.href = 'learning.html';
        }
    </script>
</body>
</html>
