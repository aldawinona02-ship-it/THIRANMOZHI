<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Completed! - Thiranmozhi</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Background Rays */
        .sunburst {
            position: absolute;
            top: 50%; left: 50%;
            width: 200vw; height: 200vw;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                rgba(255,255,255,0.1) 0 15deg,
                transparent 15deg 30deg
            );
            animation: spinBg 60s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes spinBg {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* The Certificate Card */
        .cert-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 4rem 3rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 0 rgba(0,0,0,0.1);
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border: 4px solid var(--glass-border);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .trophy-icon {
            font-size: 6rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 10px 0 #CC9A00);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .cert-card h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .student-name {
            font-family: var(--font-tamil);
            font-size: 3rem;
            color: var(--secondary);
            margin: 1rem 0;
            line-height: 1.2;
        }

        .cert-card p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="sunburst"></div>
    <canvas id="confetti"></canvas>

    <div class="cert-card">
        <div class="trophy-icon"><i class="fa-solid fa-trophy"></i></div>
        <h1>COURSE COMPLETED!</h1>
        <div class="student-name" id="cert-name">Champion</div>
        <p>You have mastered the entire map. You are now a certified Thiranmozhi scholar.</p>

        <div class="actions">
            <a href="minigame.html" class="btn btn-secondary"><i class="fa-solid fa-gamepad"></i> Play Minigame</a>
            <a href="dashboard.html" class="btn"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const student = app.state.student || JSON.parse(localStorage.getItem('thiranmozhi_student') || '{}');
            document.getElementById('cert-name').textContent = student.name || 'Champion';
            fireConfetti();
        });

        // Simple elegant confetti
        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#58CC02', '#1CB0F6', '#FFC800', '#CE82FF', '#FF9600', '#FF4B4B'];

            for(let i=0; i<100; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 1) * 20 - 5,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 10
                });
            }

            function frame() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                let active = false;
                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5; // gravity
                    p.rot += p.rotSpeed;
                    
                    if(p.y < canvas.height + 50) {
                        active = true;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot * Math.PI / 180);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                        ctx.restore();
                    }
                });
                if(active) requestAnimationFrame(frame);
            }
            frame();
        }
    </script>
</body>
</html>
