<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Adaptive Tamil Learning</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* Landing Page specifics */
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); 
            background: radial-gradient(circle at top left, var(--primary) -20%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) -20%, transparent 40%),
                        var(--bg-color);
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .hanging-letters-container {
            position: absolute;
            top: 0;
            display: flex;
            gap: 2rem;
            z-index: 5;
        }

        .hanging-letter {
            font-family: var(--font-tamil);
            font-size: 5rem;
            color: var(--text-main);
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            opacity: 0.8;
        }

        /* The string holding the letter */
        .hanging-letter::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            width: 2px;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.2) 100%);
            transform: translateX(-50%);
            box-shadow: 1px 0 2px rgba(255, 255, 255, 0.3);
        }

        .title-group {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 4rem 6rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            transform: translateY(20px);
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-family: var(--font-tamil);
            font-size: 7.5rem;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin-bottom: 1rem;
            filter: drop-shadow(0 8px 12px rgba(67, 97, 238, 0.3));
        }

        .subtitle {
            font-size: 1.8rem;
            color: #2c3e50;
            font-weight: 800;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Large Start Button */
        .btn-start {
            font-size: 2.2rem;
            padding: 1.8rem 5.5rem;
            border-radius: var(--radius-pill);
            background: var(--surface);
            border: 2px solid var(--primary);
            color: var(--text-main);
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-start:hover {
            transform: translateY(-5px) scale(1.05);
            background: var(--primary);
            color: white;
            box-shadow: 0 15px 30px rgba(189, 224, 254, 0.4);
        }
    </style>
</head>

<body>

    <!-- Hanging Letters Decoration -->
    <div class="hanging-letters-container">
        <div class="hanging-letter" style="color: var(--info)">அ</div>
        <div class="hanging-letter" style="color: var(--secondary)">ஆ</div>
        <div class="hanging-letter" style="color: var(--primary)">இ</div>
        <div class="hanging-letter" style="color: var(--accent)">ஈ</div>
        <div class="hanging-letter" style="color: var(--info)">எ</div>
        <div class="hanging-letter" style="color: var(--secondary)">ஏ</div>
    </div>

    <!-- Antigravity Canvas -->
    <canvas id="particlesCanvas"></canvas>

    <main class="landing-content page-enter" id="landing-main">
        <div class="container">
            <div class="hero-section glass-card hover-float">
                <div class="badge-new mb-1">AI-Powered Experience</div>
                <h1 class="main-title">திறன்மொழி</h1>
                <p class="section-subtitle mb-2">
                    Personalized Tamil learning for every child. Adaptive. Interactive. Fun.
                </p>
                
                <div class="cta-group" style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
                    <button class="btn btn-primary btn-start" id="start-btn">
                        <i class="fa-solid fa-graduation-cap"></i> Start Learning
                    </button>
                    <button class="btn btn-secondary" onclick="window.location.href='pre-test.html'">
                        <i class="fa-solid fa-vial"></i> Take Assessment
                    </button>
                </div>
            </div>

            <div class="features-preview mt-3" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 4rem;">
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--primary-light); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <h4>Adaptive AI</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Matches your child's unique learning style.</p>
                </div>
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--secondary); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-pen-nib"></i>
                    </div>
                    <h4>Tracing Practice</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Engaging stroke-by-stroke guidance.</p>
                </div>
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--accent); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <h4>Progress Tracking</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Detailed analytics for teachers & parents.</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .badge-new {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            background: var(--accent);
            color: var(--text-main);
            border-radius: var(--radius-pill);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }
        .hero-section {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            border: 4px solid var(--glass-border);
        }
        .main-title {
            font-size: 8rem;
            margin-bottom: 0;
            filter: drop-shadow(0 10px 15px rgba(67, 97, 238, 0.2));
        }
    </style>

    <!-- Global Logic -->
    <script src="main.js"></script>
    <script src="particles.js"></script>
    <script>
        document.getElementById('start-btn').addEventListener('click', (e) => {
            // Trigger Antigravity
            document.body.classList.add('antigravity-active');

            // Trigger Canvas Gravity Inversion
            if (window.particleEngine) {
                window.particleEngine.invertGravity();
            }

            // Navigate after animation
            setTimeout(() => {
                const mainEl = document.getElementById('landing-main');
                if (mainEl) mainEl.classList.replace('page-enter', 'page-exit');
                
                setTimeout(() => {
                    if(app.state.student) {
                        // If style is already assessed, go to learning, else dashboard
                        if(app.state.dominant_style && app.state.dominant_style !== 'unassessed') {
                            window.location.href = 'learning.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } else {
                        window.location.href = 'student-info.html';
                    }
                }, 400);
            }, 1000);
        });
    </script>
</body>

</html>
