<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Adaptive Tamil Learning</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #7209b7;
            --accent: #f72585;
            --info: #4cc9f0;
            --surface: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --font-tamil: 'Baloo Thambi 2', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(67, 97, 238, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(247, 37, 133, 0.1) 0%, transparent 40%),
                #f8f9fa;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* --- Animations --- */
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(2deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        @keyframes swing {
            0% {
                transform: rotate(-3deg);
                transform-origin: top center;
            }

            100% {
                transform: rotate(3deg);
                transform-origin: top center;
            }
        }

        /* --- Hanging Letters --- */
        .hanging-letters-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 1;
        }

        .hanging-letter {
            font-family: var(--font-tamil);
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            animation: swing 3s ease-in-out infinite alternate;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hanging-letter::before {
            content: '';
            width: 2px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.1));
            margin-bottom: -10px;
        }

        /* --- Main Content --- */
        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem 2rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease;
        }

        .main-title {
            font-family: var(--font-tamil);
            font-size: clamp(4rem, 15vw, 8rem);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .section-subtitle {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Buttons --- */
        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
        }

        /* --- Features --- */
        .features-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-item i {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: block;
            color: var(--primary);
        }

        .feature-item h4 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        /* --- Logic States --- */
        .antigravity-active {
            transition: all 1s ease-in;
            transform: translateY(-100vh);
            opacity: 0;
        }
    </style>
</head>

<body>

    <div class="hanging-letters-container">
        <div class="hanging-letter" style="color: var(--info); animation-delay: 0s;">அ</div>
        <div class="hanging-letter" style="color: var(--secondary); animation-delay: 0.2s;">ஆ</div>
        <div class="hanging-letter" style="color: var(--primary); animation-delay: 0.4s;">இ</div>
        <div class="hanging-letter" style="color: var(--accent); animation-delay: 0.6s;">ஈ</div>
        <div class="hanging-letter" style="color: var(--info); animation-delay: 0.8s;">உ</div>
    </div>

    <main class="landing-content" id="landing-main">
        <div class="glass-card">
            <span
                style="background: #e0e7ff; color: #4361ee; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 900; letter-spacing: 1px;">AI-POWERED
                TAMIL LEARNING</span>

            <h1 class="main-title">திறன்மொழி</h1>
            <p class="section-subtitle">A personalized journey to master Tamil through play, practice, and adaptive AI.
            </p>

            <div class="cta-group">
                <button class="btn btn-primary" id="start-btn">
                    <i class="fa-solid fa-rocket"></i> Get Started
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='pre-test.html'">
                    <i class="fa-solid fa-vial"></i> Quick Check
                </button>
            </div>

            <div class="features-preview">
                <div class="feature-item">
                    <i class="fa-solid fa-brain"></i>
                    <h4>Smart Learning</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Adapts to your speed</p>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-star"></i>
                    <h4>Fun Games</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Earn points as you go</p>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-child"></i>
                    <h4>Kid Safe</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Built for early learners</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Start Button Logic
        document.getElementById('start-btn').addEventListener('click', function () {
            const mainContent = document.getElementById('landing-main');

            // Add the "flying away" effect
            mainContent.classList.add('antigravity-active');

            // Wait for animation to finish then redirect
            setTimeout(() => {
                // Change this to your actual next page
                window.location.href = 'student-info.html';
            }, 800);
        });
    </script>
</body>

</html>
