<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Adaptive Tamil Learning</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* Landing Page specifics */
        body {
            overflow: hidden;
            /* important for particles */
            background: linear-gradient(135deg, #ccff90 0%, #2ecc71 100%);
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .hanging-letters-container {
            position: absolute;
            top: 0;
            display: flex;
            gap: 2rem;
            z-index: 5;
        }

        .hanging-letter {
            font-family: var(--font-tamil);
            font-size: 5rem;
            color: var(--primary-purple);
            text-shadow: 0 5px 15px rgba(155, 89, 182, 0.3);
            position: relative;
        }

        /* The string holding the letter */
        .hanging-letter::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            width: 2px;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.2) 100%);
            transform: translateX(-50%);
            box-shadow: 1px 0 2px rgba(255, 255, 255, 0.3);
        }

        .title-group {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 4rem 6rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            transform: translateY(20px);
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-family: var(--font-tamil);
            font-size: 7rem;
            background: linear-gradient(135deg, var(--primary-green) 0%, #16a085 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin-bottom: 1rem;
            filter: drop-shadow(0 5px 15px rgba(46, 204, 113, 0.3));
        }

        .subtitle {
            font-size: 1.8rem;
            color: #2c3e50;
            font-weight: 800;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Large Start Button */
        .btn-start {
            font-size: 2.2rem;
            padding: 1.8rem 5rem;
            border-radius: var(--radius-pill);
            background: linear-gradient(45deg, var(--primary-green), #27ae60);
            border: none;
            color: white;
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 45px rgba(46, 204, 113, 0.6);
        }
    </style>
</head>

<body>

    <!-- Hanging Letters Decoration -->
    <div class="hanging-letters-container">
        <div class="hanging-letter" style="color: #FF6B6B">அ</div>
        <div class="hanging-letter" style="color: #4ECDC4">ஆ</div>
        <div class="hanging-letter" style="color: #FFE66D">இ</div>
        <div class="hanging-letter" style="color: #45B7D1">ஈ</div>
        <div class="hanging-letter" style="color: #9B59B6">எ</div>
        <div class="hanging-letter" style="color: #E67E22">ஏ</div>
    </div>

    <!-- Antigravity Canvas -->
    <canvas id="particle-canvas"></canvas>

    <main class="landing-content page-enter" id="landing-main">
        <div class="title-group hover-float">
            <h1 class="main-title">திறன்மொழி</h1>
            <p class="subtitle">Adaptive Tamil Learning for Every Child</p>
        </div>

        <button class="btn btn-green btn-start" id="start-btn">
            <i class="fa-solid fa-rocket"></i> Let's Learn
        </button>
    </main>

    <!-- Global Logic -->
    <script src="main.js"></script>
    <script src="particles.js"></script>
    <script>
        document.getElementById('start-btn').addEventListener('click', (e) => {
            // Trigger Antigravity
            document.body.classList.add('antigravity-active');

            // Trigger Canvas Gravity Inversion
            if (window.particleEngine) {
                window.particleEngine.invertGravity();
            }

            // Navigate after animation
            setTimeout(() => {
                const mainEl = document.getElementById('landing-main');
                if (mainEl) mainEl.classList.replace('page-enter', 'page-exit');
                setTimeout(() => {
                    if(app.state.student) {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'student-info.html';
                    }
                }, 400);
            }, 1000);
        });
    </script>
</body>

</html>
