<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Adaptive Tamil Learning</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Landing Page specifics */
        body {
            overflow: hidden;
            background: radial-gradient(circle at top left, var(--primary) -20%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) -20%, transparent 40%),
                        var(--bg-color);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
        }

        /* --- Hanging Letters --- */
        .hanging-letters-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 1;
        }

        .hanging-letter {
            font-family: var(--font-tamil);
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            animation: swing 3s ease-in-out infinite alternate;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hanging-letter::before {
            content: '';
            width: 2px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.1));
            margin-bottom: -10px;
        }

        @keyframes swing {
            0% { transform: rotate(-3deg); transform-origin: top center; }
            100% { transform: rotate(3deg); transform-origin: top center; }
        }

        /* --- Main Content --- */
        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem 2rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease;
        }

        .main-title {
            font-family: var(--font-tamil);
            font-size: 7.5rem;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin-bottom: 1rem;
            filter: drop-shadow(0 8px 12px rgba(67, 97, 238, 0.3));
        }

        .antigravity-active {
            transition: all 1s ease-in;
            transform: translateY(-100vh);
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="hanging-letters-container">
        <div class="hanging-letter" style="color: var(--info); animation-delay: 0s;">அ</div>
        <div class="hanging-letter" style="color: var(--secondary); animation-delay: 0.2s;">ஆ</div>
        <div class="hanging-letter" style="color: var(--primary); animation-delay: 0.4s;">இ</div>
        <div class="hanging-letter" style="color: var(--accent); animation-delay: 0.6s;">ஈ</div>
        <div class="hanging-letter" style="color: var(--info); animation-delay: 0.8s;">உ</div>
    </div>

    <main class="landing-content page-enter" id="landing-main">
        <div class="container">
            <div class="hero-section glass-card hover-float" style="max-width: 900px; margin: 0 auto; text-align: center;">
                <div class="badge-new mb-1" style="display: inline-block; padding: 0.5rem 1.25rem; background: var(--accent); color: var(--text-main); border-radius: var(--radius-pill); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5rem;">AI-Powered Experience</div>
                <h1 class="main-title">திறன்மொழி</h1>
                <p class="section-subtitle mb-2" style="font-size: 1.4rem; color: var(--text-muted); margin-bottom: 2.5rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                    Personalized Tamil learning for every child. Adaptive. Interactive. Fun.
                </p>
                
                <div class="cta-group" style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
                    <button class="btn btn-primary" id="start-btn">
                        <i class="fa-solid fa-graduation-cap"></i> Start Learning
                    </button>
                    <button class="btn btn-secondary" onclick="window.location.href='pre-test.html'">
                        <i class="fa-solid fa-vial"></i> Take Assessment
                    </button>
                </div>
            </div>

            <div class="features-preview mt-3" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 4rem;">
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--primary-light); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <h4>Adaptive AI</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Matches your child's unique learning style.</p>
                </div>
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--secondary); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-pen-nib"></i>
                    </div>
                    <h4>Tracing Practice</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Engaging stroke-by-stroke guidance.</p>
                </div>
                <div class="feature-item text-center">
                    <div class="card-icon" style="background: var(--accent); color: white; margin: 0 auto 1rem; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <h4>Progress Tracking</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Detailed analytics for teachers & parents.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Logic -->
    <script src="main.js"></script>
    <script src="particles.js"></script>
    <script>
        // Start Button Logic
        document.getElementById('start-btn').addEventListener('click', function () {
            const mainContent = document.getElementById('landing-main');
            mainContent.classList.add('antigravity-active');

            setTimeout(() => {
                const mainEl = document.getElementById('landing-main');
                if (mainEl) mainEl.classList.replace('page-enter', 'page-exit');
                
                setTimeout(() => {
                    if(app.state.student) {
                        if(app.state.dominant_style && app.state.dominant_style !== 'unassessed') {
                            window.location.href = 'learning.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } else {
                        window.location.href = 'student-info.html';
                    }
                }, 400);
            }, 1000);
        });
    </script>
</body>
</html>
