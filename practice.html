<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Practice Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e8f5e9 100%);
        }

        .practice-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50;
        }

        .practice-header a {
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .practice-header .paw-counter {
            font-weight: 800;
            font-size: 1rem;
            color: #f9a825;
        }

        .gallery-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        /* ── LETTER TILE ── */
        .letter-tile {
            background: white;
            border-radius: 20px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            border: 3px solid transparent;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Vowels: green aura */
        .letter-tile.vowel {
            border-color: rgba(76, 175, 80, 0.4);
            box-shadow: 0 0 0 0 rgba(76,175,80,0.2);
            animation: glow-green-tile 3s ease-in-out infinite;
        }

        /* Consonants: orange aura */
        .letter-tile.consonant {
            border-color: rgba(255, 152, 0, 0.4);
            box-shadow: 0 0 0 0 rgba(255,152,0,0.2);
            animation: glow-orange-tile 3s ease-in-out infinite;
        }

        /* Gold mastered */
        .letter-tile.mastered {
            background: linear-gradient(135deg, #fff9c4, #fff176, #ffd54f);
            border-color: #f9a825;
            animation: glow-gold-tile 2s ease-in-out infinite;
        }

        .letter-tile.mastered .char { color: #5d4037; }

        .letter-tile:hover {
            transform: translateY(-8px) scale(1.08);
        }

        .letter-tile .char {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 3rem;
            color: var(--text-main);
            display: block;
            margin-bottom: 0.3rem;
        }

        .letter-tile.vowel .char { color: #2e7d32; }
        .letter-tile.consonant .char { color: #e65100; }

        .letter-tile .paw-row {
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
        }

        .letter-tile .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Gold star badge */
        .gold-star {
            position: absolute;
            top: 4px; right: 6px;
            font-size: 1rem;
            display: none;
            animation: spin-star 3s linear infinite;
        }

        .letter-tile.mastered .gold-star { display: block; }

        @keyframes spin-star {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            to { transform: rotate(360deg) scale(1); }
        }

        @keyframes glow-green-tile {
            0%, 100% { box-shadow: 0 4px 12px rgba(76,175,80,0.15), 0 0 0 0 rgba(76,175,80,0.1); }
            50% { box-shadow: 0 4px 20px rgba(76,175,80,0.3), 0 0 0 6px rgba(76,175,80,0.1); }
        }
        @keyframes glow-orange-tile {
            0%, 100% { box-shadow: 0 4px 12px rgba(255,152,0,0.15), 0 0 0 0 rgba(255,152,0,0.1); }
            50% { box-shadow: 0 4px 20px rgba(255,152,0,0.3), 0 0 0 6px rgba(255,152,0,0.1); }
        }
        @keyframes glow-gold-tile {
            0%, 100% { box-shadow: 0 4px 18px rgba(249,168,37,0.3), 0 0 0 4px rgba(249,168,37,0.15); }
            50% { box-shadow: 0 6px 30px rgba(249,168,37,0.6), 0 0 0 8px rgba(249,168,37,0.2); }
        }

        .category-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .category-title::after {
            content: '';
            flex-grow: 1;
            height: 3px;
            background: var(--glass-border);
            border-radius: 2px;
        }

        .practice-main {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem 100px;
        }

        .practice-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .practice-hero h2 {
            font-size: 2rem; font-weight: 800; color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .practice-hero p {
            color: var(--text-muted); font-weight: 700;
        }

        /* World separator */
        .world-separator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1.2rem;
        }

        .world-separator .world-badge {
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .world-badge.vowels-badge {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            color: #1b5e20;
        }

        .world-badge.cons-badge {
            background: linear-gradient(135deg, #ffcc80, #ffa726);
            color: #bf360c;
        }

        .world-separator::after {
            content: '';
            flex-grow: 1;
            height: 3px;
            background: var(--glass-border);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <header class="practice-header">
        <a href="map.html"><i class="fa-solid fa-map"></i> Adventure Map</a>
        <div class="paw-counter" id="paw-counter">🐾 0 | ⭐ 0</div>
    </header>

    <div class="practice-main">
        <div class="practice-hero">
            <h2>🏋️ Practice Room</h2>
            <p>Play with any letter — gold ones are already mastered!</p>
        </div>

        <div class="world-separator">
            <div class="world-badge vowels-badge">🟢 World 1: Vowels</div>
        </div>
        <div class="gallery-section" id="vowels-grid"></div>

        <div class="world-separator">
            <div class="world-badge cons-badge">🟠 World 2: Consonants</div>
        </div>
        <div class="gallery-section" id="consonants-grid"></div>
    </div>

    <script src="main.js"></script>
    <script src="adaptive-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ALL_LETTERS = [
                { char: 'அ', type: 'vowel' }, { char: 'ஆ', type: 'vowel' },
                { char: 'இ', type: 'vowel' }, { char: 'ஈ', type: 'vowel' },
                { char: 'உ', type: 'vowel' }, { char: 'ஊ', type: 'vowel' },
                { char: 'எ', type: 'vowel' }, { char: 'ஏ', type: 'vowel' },
                { char: 'ஐ', type: 'vowel' }, { char: 'ஒ', type: 'vowel' },
                { char: 'ஓ', type: 'vowel' }, { char: 'ஔ', type: 'vowel' },
                { char: 'க', type: 'consonant' }, { char: 'ங', type: 'consonant' },
                { char: 'ச', type: 'consonant' }, { char: 'ஞ', type: 'consonant' },
                { char: 'ட', type: 'consonant' }, { char: 'ண', type: 'consonant' },
                { char: 'த', type: 'consonant' }, { char: 'ந', type: 'consonant' },
                { char: 'ப', type: 'consonant' }, { char: 'ம', type: 'consonant' },
                { char: 'ய', type: 'consonant' }, { char: 'ர', type: 'consonant' },
                { char: 'ல', type: 'consonant' }, { char: 'வ', type: 'consonant' },
                { char: 'ழ', type: 'consonant' }, { char: 'ள', type: 'consonant' },
                { char: 'ற', type: 'consonant' }, { char: 'ன', type: 'consonant' }
            ];

            // Load paw data
            let letterPaws = {};
            try {
                const saved = localStorage.getItem('tm_letter_paws');
                letterPaws = saved ? JSON.parse(saved) : {};
            } catch(e) {}

            const vowelsGrid = document.getElementById('vowels-grid');
            const consonantsGrid = document.getElementById('consonants-grid');
            let totalPaws = 0;
            let goldCount = 0;

            ALL_LETTERS.forEach(item => {
                const paws = letterPaws[item.char] || 0;
                const mastered = paws >= 3;

                totalPaws += paws;
                if (mastered) goldCount++;

                let pawStr = '';
                for (let i = 0; i < 3; i++) pawStr += i < paws ? '🐾' : '·';

                const tile = document.createElement('div');
                tile.className = `letter-tile ${item.type} ${mastered ? 'mastered' : ''} pop-in`;
                tile.style.animationDelay = `${Math.random() * 0.4}s`;
                tile.innerHTML = `
                    <span class="gold-star">⭐</span>
                    <span class="char">${item.char}</span>
                    <div class="paw-row">${pawStr}</div>
                `;
                tile.title = mastered ? `${item.char} — Gold Mastered! ⭐` : `${item.char} — ${paws} Paw${paws !== 1 ? 's' : ''}`;

                tile.addEventListener('click', () => {
                    localStorage.setItem('tm_current_letter', item.char);
                    localStorage.setItem('tm_current_letter_type', item.type);
                    window.location.href = `activity.html?letter=${encodeURIComponent(item.char)}&type=${item.type}`;
                });

                if (item.type === 'vowel') vowelsGrid.appendChild(tile);
                else consonantsGrid.appendChild(tile);
            });

            // Update paw counter
            const counter = document.getElementById('paw-counter');
            if (counter) counter.textContent = `🐾 ${totalPaws} | ⭐ ${goldCount}`;
        });
    </script>
</body>
</html>
