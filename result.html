<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Your Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: radial-gradient(circle at top right, var(--primary) -20%, transparent 40%),
                        radial-gradient(circle at bottom left, var(--secondary) -20%, transparent 40%),
                        var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .celebration-icon {
            font-size: 5rem;
            color: var(--warning);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(249, 199, 79, 0.4));
        }
    </style>
</head>
<body class="app-container">

    <main class="container page-enter">
        <div class="glass-card text-center" style="max-width: 700px; margin: 0 auto; padding: 4rem;">
            <div class="celebration-icon"><i class="fa-solid fa-trophy"></i></div>
            <h1 class="mb-1" style="font-family: var(--font-tamil); font-size: 3.5rem;">Congratulations!</h1>
            <p class="section-subtitle mb-3" style="font-size: 1.3rem;">You've completed the assessment. Our AI has analyzed your learning profile.</p>

            <div class="profile-reveal mb-3" style="background: rgba(255,255,255,0.5); padding: 2.5rem; border-radius: var(--radius-lg); border: 2px dashed var(--primary);">
                <span style="font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Your Dominant Style:</span>
                <h2 id="dominant-style-text" style="font-size: 4rem; text-transform: capitalize; color: var(--primary); margin-top: 0.5rem;">Visual</h2>
            </div>

            <div class="action-footer" style="display: flex; gap: 1.5rem; justify-content: center;">
                <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" style="padding: 1.25rem 4rem;">
                    Go to Dashboard <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const style = app.state.dominant_style || 'General';
             document.getElementById('dominant-style-text').innerText = style;
             
             // Trigger Confetti or some celebration if possible
             console.log("Assessment Complete for", app.state.student.name);
        });
    </script>
</body>
</html>
