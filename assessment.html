<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Assessment Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary: #4A90E2;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: #E2E8F0;
        }

        .assessment-container { max-width: 800px; margin: 2rem auto; padding: 2rem; }
        .test-section { display: none; }
        .test-section.active { display: block; animation: fadeIn 0.5s ease-out; }

        .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .option-btn {
            background: white; border: 3px solid var(--glass-border);
            padding: 2rem; font-size: 3rem; font-family: 'Baloo Thambi 2', cursive;
            border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .option-btn:hover { border-color: var(--primary); transform: translateY(-5px); }

        .writing-area { 
            background: white; border: 4px solid var(--glass-border); 
            border-radius: 24px; height: 400px; margin: 2rem 0; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        .btn-premium {
            background: var(--primary); color: white; border: none;
            padding: 1rem 2rem; border-radius: 50px; font-weight: 800; cursor: pointer;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body style="background: #f8fafc; font-family: 'Nunito', sans-serif;">

    <header style="padding: 1rem 2rem; background: white; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee;">
        <span style="font-weight: 800; color: #64748b;">THIRANMOZHI</span>
        <div style="flex-grow: 1; margin: 0 3rem; height: 10px; background: #E2E8F0; border-radius: 10px;">
            <div id="assessment-progress-bar" style="width: 10%; height: 100%; background: #4A90E2; transition: 0.4s;"></div>
        </div>
        <div id="q-count" style="font-weight: 800; color: #4A90E2;">Q 1 / 10</div>
    </header>

    <main class="assessment-container">
        <div class="glass-card" style="background: white; padding: 3rem; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;">
            
            <div id="section-reading" class="test-section active">
                <h2 style="font-weight: 800;">Identify the Letter</h2>
                <p>Click the letter that sounds like: <strong id="target-sound">"A"</strong></p>
                <div class="option-grid" id="reading-options"></div>
            </div>

            <div id="section-listening" class="test-section">
                <h2 style="font-weight: 800;">Listen and Match</h2>
                <p>Listen carefully, then pick the correct letter.</p>
                <button class="btn-premium" id="play-q-sound" style="margin: 1.5rem 0;">
                    <i class="fa-solid fa-play"></i> Play Sound
                </button>
                <div class="option-grid" id="listening-options"></div>
            </div>

            <div id="section-writing" class="test-section">
                <h2 style="font-weight: 800;">Draw the Letter</h2>
                <p>Draw this letter on the screen: <strong id="target-write-letter" style="font-size: 2rem;">ழ</strong></p>
                <div class="writing-area">
                    <canvas id="assessment-canvas"></canvas>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-premium" id="clear-write-btn" style="background: #cbd5e1; color: #475569; flex: 1;">Clear</button>
                    <button class="btn-premium" id="submit-write-btn" style="flex: 2;">Submit Drawing</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/assessment.js"></script>
</body>
</html>
