<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Discovery Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ==============================
           MAP PAGE LAYOUT
        ============================== */
        body { overflow-x: hidden; }

        .map-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .map-header .brand {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .map-header .student-pill {
            background: var(--primary-light);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .paw-counter {
            display: flex; align-items: center; gap: 0.5rem;
            font-weight: 800;
            color: var(--warning);
            font-size: 1rem;
        }

        /* ==============================
           MAP SCROLL AREA
        ============================== */
        .map-scroll {
            padding-top: 80px;
            padding-bottom: 120px;
            min-height: 100vh;
            background: linear-gradient(180deg, #e0f7fa 0%, #b3e5fc 30%, #b2dfdb 60%, #c8e6c9 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative bg elements */
        .map-scroll::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
            pointer-events: none;
        }

        /* ==============================
           MAP PATH & NODES
        ============================== */
        .map-path {
            max-width: 420px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* Dashed connecting line between rows */
        .path-connector {
            display: flex;
            justify-content: center;
            padding: 0.3rem 0;
        }

        .path-connector .dashes {
            width: 4px;
            height: 40px;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.8) 0px,
                rgba(255,255,255,0.8) 8px,
                transparent 8px,
                transparent 16px
            );
            border-radius: 2px;
        }

        .map-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        /* ==============================
           NODE STYLES
        ============================== */
        .map-node {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }

        .map-node .node-char {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .map-node .node-paws {
            font-size: 0.55rem;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* LOCKED */
        .map-node.locked {
            background: #cfd8dc;
            border: 3px solid #90a4ae;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        .map-node.locked .node-char { color: #78909c; }

        .map-node.locked::after {
            content: '🔒';
            position: absolute;
            top: -8px; right: -8px;
            font-size: 0.9rem;
        }

        /* UNLOCKED VOWEL - green aura */
        .map-node.unlocked-vowel {
            background: white;
            border: 4px solid #4caf50;
            box-shadow: 0 0 0 6px rgba(76, 175, 80, 0.15), 0 4px 20px rgba(76,175,80,0.3);
            animation: glow-green 2.5s ease-in-out infinite;
        }
        .map-node.unlocked-vowel .node-char { color: #2e7d32; }

        /* UNLOCKED CONSONANT - orange aura */
        .map-node.unlocked-consonant {
            background: white;
            border: 4px solid #ff9800;
            box-shadow: 0 0 0 6px rgba(255, 152, 0, 0.15), 0 4px 20px rgba(255,152,0,0.3);
            animation: glow-orange 2.5s ease-in-out infinite;
        }
        .map-node.unlocked-consonant .node-char { color: #e65100; }

        /* ACTIVE (current) node */
        .map-node.active-node {
            transform: scale(1.15);
            z-index: 5;
        }

        /* MASTERED - gold */
        .map-node.mastered {
            background: linear-gradient(135deg, #fff176, #ffd54f, #ffca28);
            border: 4px solid #f9a825;
            box-shadow: 0 0 0 6px rgba(249, 168, 37, 0.2), 0 4px 25px rgba(249,168,37,0.5);
            animation: glow-gold 2s ease-in-out infinite;
        }
        .map-node.mastered .node-char { color: #5d4037; }

        .map-node.mastered::after {
            content: '⭐';
            position: absolute;
            top: -10px; right: -10px;
            font-size: 1rem;
            animation: spin-star 3s linear infinite;
        }

        /* REVIEW node */
        .map-node.review-node {
            background: linear-gradient(135deg, #ce93d8, #ba68c8);
            border: 4px solid #7b1fa2;
            box-shadow: 0 0 0 6px rgba(123,31,162,0.15), 0 4px 20px rgba(123,31,162,0.3);
            width: 90px;
            height: 90px;
            animation: glow-purple 2s ease-in-out infinite;
        }
        .map-node.review-node.locked {
            background: #cfd8dc;
            border-color: #90a4ae;
            animation: none;
            box-shadow: none;
        }
        .map-node.review-node .node-char { color: white; font-size: 1.4rem; }

        /* Hover */
        .map-node:not(.locked):hover {
            transform: scale(1.2) translateY(-4px);
        }
        .map-node.active-node:not(.locked):hover {
            transform: scale(1.25) translateY(-4px);
        }

        /* ==============================
           TIGER MASCOT
        ============================== */
        .tiger-mascot {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tiger-body {
            font-size: 3.5rem;
            display: block;
            animation: tiger-idle 4s ease-in-out infinite;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
            cursor: pointer;
            pointer-events: all;
        }

        .tiger-body.tiger-happy {
            animation: tiger-jump 0.6s ease forwards;
        }

        .tiger-body.tiger-curious {
            animation: tiger-curious 1s ease forwards;
        }

        .tiger-bubble {
            background: white;
            border-radius: 20px;
            border: 3px solid #ff9800;
            padding: 0.7rem 1.2rem;
            font-weight: 800;
            font-size: 0.85rem;
            color: #333;
            max-width: 200px;
            margin: 0 auto 8px auto;
            position: relative;
            animation: bubble-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .tiger-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: #ff9800;
        }

        .tiger-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: white;
            z-index: 1;
        }

        /* ==============================
           PRACTICE ROOM BUTTON
        ============================== */
        .fab-practice {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 300;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.9rem 1.4rem;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(100,150,220,0.4);
            display: flex; align-items: center; gap: 0.6rem;
            transition: all 0.3s ease;
            animation: fab-pulse 3s ease-in-out infinite;
            font-family: 'Nunito', sans-serif;
        }

        .fab-practice:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(100,150,220,0.5);
        }

        /* ==============================
           WORLD LABEL
        ============================== */
        .world-label {
            text-align: center;
            margin: 2rem 0 1rem;
            position: relative;
        }

        .world-label .badge {
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255,152,0,0.4);
            font-family: 'Nunito', sans-serif;
        }

        .world-label.world-vowels .badge {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            box-shadow: 0 4px 15px rgba(76,175,80,0.4);
        }

        /* ==============================
           KEYFRAMES
        ============================== */
        @keyframes glow-green {
            0%, 100% { box-shadow: 0 0 0 6px rgba(76,175,80,0.15), 0 4px 20px rgba(76,175,80,0.3); }
            50% { box-shadow: 0 0 0 10px rgba(76,175,80,0.25), 0 4px 30px rgba(76,175,80,0.5); }
        }
        @keyframes glow-orange {
            0%, 100% { box-shadow: 0 0 0 6px rgba(255,152,0,0.15), 0 4px 20px rgba(255,152,0,0.3); }
            50% { box-shadow: 0 0 0 10px rgba(255,152,0,0.25), 0 4px 30px rgba(255,152,0,0.5); }
        }
        @keyframes glow-gold {
            0%, 100% { box-shadow: 0 0 0 6px rgba(249,168,37,0.2), 0 4px 25px rgba(249,168,37,0.5); }
            50% { box-shadow: 0 0 0 12px rgba(249,168,37,0.35), 0 4px 40px rgba(249,168,37,0.7); }
        }
        @keyframes glow-purple {
            0%, 100% { box-shadow: 0 0 0 6px rgba(123,31,162,0.15), 0 4px 20px rgba(123,31,162,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(123,31,162,0.25), 0 4px 35px rgba(123,31,162,0.5); }
        }
        @keyframes spin-star {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            to { transform: rotate(360deg) scale(1); }
        }
        @keyframes tiger-idle {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }
        @keyframes tiger-jump {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.2) rotate(5deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); }
        }
        @keyframes tiger-curious {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-20deg) translateX(10px); }
        }
        @keyframes bubble-pop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fab-pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(100,150,220,0.4); }
            50% { box-shadow: 0 8px 35px rgba(100,150,220,0.6); }
        }

        /* Map node label tooltip */
        .map-node .node-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            font-weight: 700;
            color: rgba(0,0,0,0.5);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="map-header">
        <div class="brand">🐅 THIRANMOZHI</div>
        <div class="paw-counter">
            <span id="paw-total">🐾 0</span>
            <span style="color:#ccc; font-weight:400;">|</span>
            <span id="gold-total" style="color:#f9a825;">⭐ 0</span>
        </div>
        <div class="student-pill">
            <i class="fa-solid fa-user"></i>
            <span id="header-name">Student</span>
        </div>
    </header>

    <!-- MAP SCROLL AREA -->
    <div class="map-scroll">
        <div class="map-path" id="map-path">
            <!-- Nodes injected by map.js -->
        </div>
    </div>

    <!-- CLEVER TIGER -->
    <div class="tiger-mascot" id="tiger-mascot">
        <div class="tiger-bubble" id="tiger-bubble" style="display:none;"></div>
        <span class="tiger-body" id="tiger-body" onclick="window.mapEngine.tigerTalk()">🐅</span>
    </div>

    <!-- PRACTICE ROOM FAB -->
    <button class="fab-practice" onclick="window.location.href='practice.html'">
        <i class="fa-solid fa-dumbbell"></i> Practice Room
    </button>

    <script src="main.js"></script>
    <script src="adaptive-engine.js"></script>
    <script src="map.js"></script>
</body>
</html>
