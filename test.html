<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            overflow-x: hidden;
            color: var(--text-main);
        }
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-pill);
            margin-bottom: 2.5rem;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--info));
            width: 0%; 
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(189, 224, 254, 0.3);
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 3.5rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #test-container {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .assessment-header {
            margin-bottom: 2.5rem;
        }
        #test-title {
            font-size: 2.5rem;
            color: var(--text-main);
            font-family: var(--font-tamil);
            font-weight: 800;
        }
        .instruction-text {
            font-size: 1.3rem !important;
            color: var(--text-muted) !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body class="app-container">

    <header class="top-nav page-enter">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி</a>
        <div class="user-badge" id="student-badge">
            <i class="fa-solid fa-user"></i> <span id="student-name-display">Student</span>
        </div>
    </header>

    <main class="main-content page-enter" style="animation-delay: 0.1s;">
        <div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
            
            <div class="assessment-header text-center">
                <span id="test-progress" style="font-weight: 800; color: var(--primary-purple); font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase;">Assessment Phase</span>
                <div class="progress-bar-container mt-1">
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
            </div>

            <div class="text-center mb-4">
                <h2 id="test-title" class="mb-1">Loading Assessment...</h2>
                <p id="test-instruction" style="font-size: 1.3rem; color: #576574; font-weight: 600;" class="instruction-text"></p>
            </div>

            <!-- Dynamic Test Container injected by tests.js -->
            <div id="test-container" class="test-area page-enter">
                <!-- Content goes here -->
            </div>

        </div>
    </main>

    <script src="main.js"></script>
    <script src="tests.js"></script>
    <script>
        // Set student name in header
        document.addEventListener('DOMContentLoaded', () => {
            if(app.state.student && app.state.student.name) {
                document.getElementById('student-name-display').innerText = app.state.student.name;
            }
        });
    </script>
</body>
</html>
