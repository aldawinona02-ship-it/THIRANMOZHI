<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            overflow-x: hidden;
            color: var(--text-main);
        }
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-pill);
            margin-bottom: 2.5rem;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--info));
            width: 0%; 
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(189, 224, 254, 0.3);
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 3.5rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #test-container {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .assessment-header {
            margin-bottom: 2.5rem;
        }
        #test-title {
            font-size: 2.5rem;
            color: var(--text-main);
            font-family: var(--font-tamil);
            font-weight: 800;
        }
        .instruction-text {
            font-size: 1.3rem !important;
            color: var(--text-muted) !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body class="app-container">

    <header class="top-nav page-enter">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி</a>
        <div class="user-badge" id="student-badge">
            <i class="fa-solid fa-user"></i> <span id="student-name-display">Student</span>
        </div>
    </header>

    <main class="main-content container page-enter" style="padding-top: 4rem;">
        <div class="glass-card" style="max-width: 850px; margin: 0 auto; position: relative; overflow: hidden;">
            
            <!-- Assessment Header -->
            <div class="assessment-header text-center mb-2">
                <div class="badge-new mb-1" id="test-category" style="background: var(--primary-light); color: white;">Visual Activity</div>
                <h2 id="test-title" class="mb-1" style="font-family: var(--font-tamil); font-size: 2.5rem;">Letter Recognition</h2>
                <p id="test-instruction" class="section-subtitle" style="font-size: 1.1rem; color: var(--text-muted);">Identify the letter shown below.</p>
            </div>

            <!-- Modern Progress Bar -->
            <div class="progress-container mb-3" style="background: #E2E8F0; height: 12px; border-radius: var(--radius-pill); overflow: hidden; position: relative;">
                <div id="progress-bar" style="width: 10%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
            </div>

            <!-- Activity Area -->
            <div id="test-container" class="test-area page-enter" style="min-height: 350px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.02); border-radius: var(--radius-md); padding: 2rem;">
                <!-- Content injected by tests.js -->
                <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Activity...</div>
            </div>

            <!-- Footer Meta -->
            <div class="test-footer mt-2 text-center" style="font-size: 0.9rem; color: var(--text-muted); font-weight: 700; opacity: 0.6;">
                <span id="activity-count">Activity 1 of 9</span>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="tests.js"></script>
    <script>
        // Set student name in header
        document.addEventListener('DOMContentLoaded', () => {
            if(app.state.student && app.state.student.name) {
                document.getElementById('student-name-display').innerText = app.state.student.name;
            }
        });
    </script>
</body>
</html>
