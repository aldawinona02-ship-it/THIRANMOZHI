<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Ready! - THIRANMOZHI</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: white;
            text-align: center;
        }
        .content {
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            font-family: var(--font-tamil);
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }
        .icon-box {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .loading-dots span {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: white;
            margin: 0 5px;
            animation: dotFlashing 1s infinite alternate;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotFlashing {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="icon-box">
            <i class="fa-solid fa-rocket"></i>
        </div>
        <h1>Get Ready for the Learning Style Test!</h1>
        <p>We're preparing a special series of tasks just for you...</p>
        
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'test.html';
        }, 3500);
    </script>
</body>
</html>
