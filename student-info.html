<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Student Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: radial-gradient(circle at top right, var(--primary) -20%, transparent 40%),
                        radial-gradient(circle at bottom left, var(--secondary) -20%, transparent 40%),
                        var(--bg-color);
            overflow-x: hidden;
            height: auto;
            min-height: 100vh;
        }
        .onboarding-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: 100vh;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 4rem;
            width: 100%;
            max-width: 650px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .input-control {
            background: white;
            border: 2px solid #edf2f7;
            padding: 1.2rem;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            font-family: var(--font-ui);
        }
        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(189, 224, 254, 0.3);
            transform: translateY(-2px);
        }
        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.9;
        }
        .welcome-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-main);
            font-family: var(--font-tamil);
        }
        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.4rem;
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 800;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(189, 224, 254, 0.4);
            background: #a2d2ff;
        }
    </style>
</head>
<body class="app-container">

    <main class="onboarding-container container">
        <div class="glass-card text-center" style="max-width: 650px; margin: 0 auto;">
            <div class="step-indicator mb-1" style="font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;">Step 1 of 2</div>
            <h1 class="welcome-title">வணக்கம்!</h1>
            <p class="mb-2" style="font-size: 1.1rem; color: var(--text-muted); font-weight: 600;">Welcome to THIRANMOZHI. Let's create your learning profile.</p>

            <form id="studentForm" class="text-left" style="background: rgba(255,255,255,0.5); padding: 2rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border);">
                <div class="input-group mb-1">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" class="input-control" placeholder="e.g. Rahul" required style="border: 2px solid #E2E8F0; padding: 1rem; border-radius: var(--radius-sm); width: 100%;">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;" class="mb-1">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" class="input-control" min="4" max="18" placeholder="Age" required style="border: 2px solid #E2E8F0; padding: 1rem; border-radius: var(--radius-sm); width: 100%;">
                    </div>
                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" class="input-control" required style="border: 2px solid #E2E8F0; padding: 1rem; border-radius: var(--radius-sm); width: 100%;">
                            <option value="">Select</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;" class="mb-2">
                    <div class="input-group">
                        <label for="phone">Parent Phone</label>
                        <input type="tel" id="phone" class="input-control" placeholder="+91..." required style="border: 2px solid #E2E8F0; padding: 1rem; border-radius: var(--radius-sm); width: 100%;">
                    </div>
                    <div class="input-group">
                        <label for="email">Parent Email</label>
                        <input type="email" id="email" class="input-control" placeholder="parent@example.com" required style="border: 2px solid #E2E8F0; padding: 1rem; border-radius: var(--radius-sm); width: 100%;">
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1.2rem; border-radius: 50px; box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);">
                        Continue to Learning Discovery <i class="fa-solid fa-rocket"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("studentForm");
            if(form){
                form.addEventListener("submit", function(e){
                    e.preventDefault();

                    const studentData = {
                        name: document.getElementById("name").value,
                        age: document.getElementById("age").value,
                        gender: document.getElementById("gender").value,
                        phone: document.getElementById("phone").value,
                        email: document.getElementById("email").value
                    };

                    localStorage.setItem("thiranmozhi_student", JSON.stringify(studentData));

                    // Update global app state
                    if(window.app && window.app.state) {
                        window.app.state.student = studentData;
                        window.app.resetAssessment();
                        window.app.saveState();
                    }

                    window.location.href = "test-intro.html";
                });
            }
        });
    </script>
</body>
</html>
