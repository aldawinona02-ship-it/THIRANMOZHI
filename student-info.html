<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Student Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="app-container">

    <header class="top-nav page-enter">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி</a>
    </header>

    <main class="main-content page-enter" style="animation-delay: 0.1s;">
        <div class="glass-panel" style="max-width: 600px; margin: 0 auto; text-align: center;">
            <div class="card-icon" style="margin: 0 auto 1rem; background: var(--primary-yellow); color: #d4af37;">
                <i class="fa-solid fa-child-reaching"></i>
            </div>
            
            <h2 class="mb-1">Welcome to Thiranmozhi! 🌟</h2>
            <p class="mb-2" style="color: var(--text-dark);">Let's get to know you before we start our adventure.</p>

            <form id="studentForm" class="mt-2 text-left">
                <div class="input-group">
                    <label for="name">What is your name?</label>
                    <input type="text" id="name" class="input-control" placeholder="Student Name" required>
                </div>
                
                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" class="input-control" min="4" max="18" placeholder="Age" required>
                    </div>
                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" class="input-control" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="phone">Phone (Optional)</label>
                        <input type="tel" id="phone" class="input-control" placeholder="Phone">
                    </div>
                    <div class="input-group">
                        <label for="email">Email (Optional)</label>
                        <input type="email" id="email" class="input-control" placeholder="Email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="disorder">Support Needs (Optional)</label>
                    <select id="disorder" class="input-control">
                        <option>None</option>
                        <option>Autism Spectrum Disorder</option>
                        <option>Intellectual Developmental Disorder</option>
                        <option>Learning Difficulty</option>
                    </select>
                </div>

                <div class="text-center mt-2">
                    <button type="submit" class="btn btn-blue" style="width: 100%;">
                        Continue <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("studentForm");
            if(form){
                form.addEventListener("submit", function(e){
                    e.preventDefault();

                    const studentData = {
                        name: document.getElementById("name").value,
                        age: document.getElementById("age").value,
                        gender: document.getElementById("gender").value,
                        phone: document.getElementById("phone").value,
                        email: document.getElementById("email").value,
                        disorder: document.getElementById("disorder").value
                    };

                    localStorage.setItem("thiranmozhi_student", JSON.stringify(studentData));

                    // Update global app state as well so dashboard components don't break
                    if(window.app && window.app.state) {
                        try {
                            window.app.state.student = studentData;
                            window.app.resetAssessment();
                        } catch(err) {
                            console.warn(err);
                        }
                    }

                    window.location.href = "test.html";
                });
            }
        });
    </script>
</body>
</html>
