<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Student Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            background: radial-gradient(circle at top right, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            overflow-x: hidden;
            height: auto;
            min-height: 100vh;
        }
        .onboarding-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 4rem;
            width: 100%;
            max-width: 650px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .input-control {
            background: white;
            border: 2px solid #edf2f7;
            padding: 1.2rem;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            font-family: var(--font-ui);
        }
        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(189, 224, 254, 0.3);
            transform: translateY(-2px);
        }
        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.9;
        }
        .welcome-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-main);
            font-family: var(--font-tamil);
        }
        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.4rem;
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 800;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(189, 224, 254, 0.4);
            background: #a2d2ff;
        }
    </style>
</head>
<body class="app-container">

    <main class="onboarding-container">
        <div class="glass-panel text-center">
            <h1 class="welcome-title">வணக்கம்!</h1>
            <p class="mb-3" style="font-size: 1.2rem; color: var(--text-muted); font-weight: 600;">Welcome to ThiranMozhi. Let's get to know you!</p>

            <form id="studentForm" class="mt-2 text-left">
                <div class="input-group">
                    <label for="name">What is your name?</label>
                    <input type="text" id="name" class="input-control" placeholder="Enter student name" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" class="input-control" min="4" max="18" placeholder="Age" required>
                    </div>
                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" class="input-control" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="input-group">
                        <label for="phone">Phone (Optional)</label>
                        <input type="tel" id="phone" class="input-control" placeholder="Contact number">
                    </div>
                    <div class="input-group">
                        <label for="email">Email (Optional)</label>
                        <input type="email" id="email" class="input-control" placeholder="Email address">
                    </div>
                </div>

                <div class="input-group">
                    <label for="disorder">Support Needs (Optional)</label>
                    <select id="disorder" class="input-control">
                        <option>None</option>
                        <option>Autism Spectrum Disorder</option>
                        <option>Intellectual Developmental Disorder</option>
                        <option>Learning Difficulty</option>
                    </select>
                </div>

                <div class="text-center mt-3">
                    <button type="submit" class="btn-submit">
                        Let's Begin <i class="fa-solid fa-sparkles"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("studentForm");
            if(form){
                form.addEventListener("submit", function(e){
                    e.preventDefault();

                    const studentData = {
                        name: document.getElementById("name").value,
                        age: document.getElementById("age").value,
                        gender: document.getElementById("gender").value,
                        phone: document.getElementById("phone").value,
                        email: document.getElementById("email").value,
                        disorder: document.getElementById("disorder").value
                    };

                    localStorage.setItem("thiranmozhi_student", JSON.stringify(studentData));

                    // Update global app state
                    if(window.app && window.app.state) {
                        window.app.state.student = studentData;
                        window.app.resetAssessment();
                        window.app.saveState();
                    }

                    window.location.href = "pre-test.html";
                });
            }
        });
    </script>
</body>
</html>
