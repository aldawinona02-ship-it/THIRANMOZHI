<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Learn Letter</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ==============================
           ACTIVITY PAGE STYLES
        ============================== */
        .activity-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50;
        }

        .activity-header .back-btn {
            background: none; border: none;
            font-size: 1.1rem; font-weight: 800;
            cursor: pointer; color: var(--primary);
            display: flex; align-items: center; gap: 0.5rem;
            font-family: 'Nunito', sans-serif;
        }

        .activity-content {
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1.5rem 100px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e8f5e9 100%);
        }

        /* Glowing letter display */
        .letter-hero {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            animation: letter-float 3s ease-in-out infinite;
            position: relative;
        }

        .letter-hero.vowel-glow {
            color: #2e7d32;
            text-shadow:
                0 0 20px rgba(76,175,80,0.6),
                0 0 40px rgba(76,175,80,0.4),
                0 0 60px rgba(76,175,80,0.2);
        }

        .letter-hero.consonant-glow {
            color: #e65100;
            text-shadow:
                0 0 20px rgba(255,152,0,0.6),
                0 0 40px rgba(255,152,0,0.4),
                0 0 60px rgba(255,152,0,0.2);
        }

        @keyframes letter-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Style badge */
        .style-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .badge-visual { background: linear-gradient(135deg, #e1bee7, #ce93d8); color: #4a148c; }
        .badge-auditory { background: linear-gradient(135deg, #b3e5fc, #81d4fa); color: #01579b; }
        .badge-kinesthetic { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); color: #1b5e20; }

        /* Choice buttons */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 420px;
            margin-top: 1.5rem;
        }

        .choice-btn {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 2.5rem;
            font-weight: 800;
            padding: 1.2rem 0.5rem;
            border-radius: 20px;
            border: 4px solid rgba(0,0,0,0.08);
            background: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .choice-btn:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .choice-btn.correct {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            border-color: #2e7d32;
            color: white;
            transform: scale(1.15);
        }

        .choice-btn.wrong {
            background: linear-gradient(135deg, #ffcdd2, #ef9a9a);
            border-color: #c62828;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* TIGER mascot in activity */
        .activity-tiger {
            font-size: 4rem;
            text-align: center;
            animation: tiger-idle 4s ease-in-out infinite;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        @keyframes tiger-idle {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        .tiger-speech {
            background: white;
            border: 3px solid #ff9800;
            border-radius: 18px;
            padding: 0.7rem 1.4rem;
            font-weight: 800;
            font-size: 1rem;
            color: #333;
            max-width: 280px;
            margin: 0 auto 0.5rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: bubble-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes bubble-pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* TRACING section */
        .tracing-section {
            width: 100%;
            max-width: 420px;
        }

        .accuracy-bar-container {
            width: 100%;
            background: rgba(0,0,0,0.1);
            border-radius: 50px;
            height: 20px;
            margin: 1rem 0;
            overflow: hidden;
            border: 2px solid white;
        }

        .accuracy-bar {
            height: 100%;
            background: linear-gradient(90deg, #ef5350, #ff9800, #4caf50);
            border-radius: 50px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .accuracy-label {
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .trace-canvas-wrapper {
            position: relative;
            background: white;
            border-radius: 24px;
            border: 5px solid #ff9800;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(255,152,0,0.2);
            aspect-ratio: 1;
        }

        #guide-canvas-a {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #trace-canvas-a {
            width: 100%; height: 100%;
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        /* Paw result banner */
        .paw-banner {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(135deg, #fff176, #ffd54f);
            border: 4px solid #f9a825;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            animation: bubble-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
            display: none;
        }

        .paw-banner.show {
            display: block;
        }

        .paw-banner h2 {
            font-size: 2rem;
            color: #5d4037;
            margin-bottom: 0.5rem;
        }

        .paw-icons {
            font-size: 2.5rem;
            letter-spacing: 8px;
            margin: 0.5rem 0;
        }

        .btn-back-map {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1.2rem 2rem;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46,125,50,0.35);
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
            display: none;
            margin-top: 1rem;
        }

        .btn-back-map.show {
            display: block;
        }

        .btn-back-map:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(46,125,50,0.5);
        }

        /* Sound play button */
        .sound-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #29b6f6, #0288d1);
            border: none;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 25px rgba(2,136,209,0.4);
            transition: all 0.3s ease;
            animation: sound-pulse 2s ease-in-out infinite;
        }
        .sound-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(2,136,209,0.5);
        }
        @keyframes sound-pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(2,136,209,0.4); }
            50% { box-shadow: 0 8px 40px rgba(2,136,209,0.7); }
        }
    </style>
</head>
<body>
    <header class="activity-header">
        <button class="back-btn" onclick="window.location.href='map.html'">
            <i class="fa-solid fa-arrow-left"></i> Map
        </button>
        <div id="activity-style-badge" class="style-badge"></div>
        <div id="paw-status" style="font-size:1.5rem; font-weight:800;"></div>
    </header>

    <div class="activity-content">
        <div id="activity-container">
            <!-- Injected by activity.js -->
        </div>
    </div>

    <script src="main.js"></script>
    <script src="adaptive-engine.js"></script>
    <script src="activity.js"></script>
</body>
</html>
