<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                #f8f9fa;
            color: var(--text-main);
        }

        .top-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .nav-brand {
            font-family: var(--font-tamil);
            font-size: 1.8rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
        }

        .nav-brand i {
            color: var(--info);
            margin-right: 0.5rem;
        }

        .teacher-view-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        #dash-name {
            font-size: 2.5rem;
            font-family: var(--font-tamil);
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .btn-reset {
            padding: 0.8rem 1.5rem;
            background: var(--error);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body class="app-container">

    <header class="top-nav container"
        style="display: flex; justify-content: space-between; align-items: center; padding: 2rem 0;">
        <a href="index.html" class="nav-brand"
            style="font-family: var(--font-tamil); font-size: 1.8rem; font-weight: 800; color: var(--primary);"><i
                class="fa-solid fa-leaf"></i> திறன்மொழி Portal</a>
        <div class="header-actions" style="display: flex; gap: 1rem;">
            <button class="btn btn-premium" onclick="window.location.href='practice.html'">
                <i class="fa-solid fa-graduation-cap"></i> Resume Practice
            </button>
            <button class="btn btn-secondary"
                style="padding: 0.8rem 1.2rem; background: var(--error); box-shadow: 0 4px 0 #b91c1c;"
                onclick="if(confirm('Reset all progress?')) { localStorage.clear(); window.location.href='index.html'; }">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>
    </header>

    <main class="main-content container page-enter" style="padding-top: 1rem;">
        <!-- Student Hero Section -->
        <div class="glass-card mb-2"
            style="display: flex; align-items: center; gap: 2rem; border-left: 8px solid var(--primary);">
            <div class="avatar-large"
                style="width: 100px; height: 100px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; border: 4px solid white; box-shadow: var(--shadow-md);">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <div>
                <h1 id="dash-name" style="font-family: var(--font-tamil); font-size: 2.5rem; line-height: 1.1;">Welcome
                    back!</h1>
                <p id="dash-age" style="color: var(--text-muted); font-weight: 700; font-size: 1.1rem;">Visual Learner |
                    Age 8</p>
            </div>
        </div>

        <div id="dashboard-content" class="dashboard-grid">
            <!-- Dynamically populated by dashboard.js -->
            <div class="loader text-center" style="grid-column: 1 / -1; padding: 5rem;">
                <i class="fa-solid fa-spinner fa-spin fa-3x" style="color: var(--primary);"></i>
                <p class="mt-1">Loading your progress...</p>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="adaptive-engine.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
