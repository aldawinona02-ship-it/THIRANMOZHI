<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        body {
            background: radial-gradient(circle at top left, var(--primary) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, var(--secondary) 0%, transparent 40%),
                        #f8f9fa;
            color: var(--text-main);
        }
        .top-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .nav-brand {
            font-family: var(--font-tamil);
            font-size: 1.8rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
        }
        .nav-brand i {
            color: var(--info);
            margin-right: 0.5rem;
        }
        .teacher-view-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }
        #dash-name {
            font-size: 2.5rem;
            font-family: var(--font-tamil);
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        .btn-reset {
            padding: 0.8rem 1.5rem;
            background: var(--error);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        .btn-reset:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body class="app-container">

    <header class="top-nav">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி Portal</a>
        <button class="btn btn-secondary" onclick="window.location.href='learning.html'">
            <i class="fa-solid fa-gamepad"></i> Back to Game
        </button>
    </header>

    <main class="main-content" style="padding: 3rem 5%; height: auto; min-height: 100vh;">
        <div class="teacher-view-header">
            <div>
                <h1 id="dash-name">Student Profile</h1>
                <p id="dash-age" style="color: var(--text-muted); font-size: 1.2rem; font-weight: 600;">Loading details...</p>
            </div>
            
            <button class="btn-reset" onclick="if(confirm('Reset all progress and student data?')) { localStorage.clear(); window.location.href='index.html'; }">
                <i class="fa-solid fa-trash-can"></i> Reset Profile
            </button>
        </div>

        <div id="dashboard-content">
            <!-- Loading State -->
            <div class="text-center">
                <h2>Loading Analytics...</h2>
            </div>
        </div>

    </main>

    <script src="main.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
