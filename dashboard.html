<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRANMOZHI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        .teacher-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0e0e0;
        }
    </style>
</head>
<body class="app-container" style="background: #f8fafc;">

    <header class="top-nav">
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-leaf"></i> திறன்மொழி (Teacher Portal)</a>
        <a href="learning.html" class="btn btn-blue btn-small"><i class="fa-solid fa-gamepad"></i> Back to Game</a>
    </header>

    <main class="main-content page-enter">
        <div class="teacher-view-header">
            <div>
                <h1 id="dash-name" style="color: var(--text-dark);">Student Profile</h1>
                <p id="dash-age" style="color: var(--text-muted); font-size: 1.1rem;">Loading...</p>
            </div>
            
            <button class="btn btn-yellow" onclick="if(confirm('Reset all progress?')) { app.resetAssessment(); app.state.student = null; app.saveState(); app.navigate('index.html'); }">
                <i class="fa-solid fa-trash-can"></i> Reset Profile
            </button>
        </div>

        <!-- Rendered by dashboard.js -->
        <div id="dashboard-content">
            <!-- Loading State -->
            <div class="text-center">
                <h2>Loading Analytics...</h2>
            </div>
        </div>

    </main>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
